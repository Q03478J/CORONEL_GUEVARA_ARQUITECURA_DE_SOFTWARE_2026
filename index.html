<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arquitectura de Software</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🔝 MENÚ SUPERIOR -->
<nav>
    <h2>Arquitectura de Software</h2>
    <div class="menu">
        <button onclick="mostrarInicio()">Inicio</button>
        <button onclick="verSemana(1)">Semana 1</button>
        <button onclick="verSemana(2)">Semana 2</button>
        <button onclick="verSemana(3)">Semana 3</button>
        <button onclick="verSemana(4)">Semana 4</button>
        <button onclick="verSemana(5)">Semana 5</button>
        <button onclick="verSemana(6)">Semana 6</button>
        <button onclick="verSemana(7)">Semana 7</button>
        <button onclick="verSemana(8)">Semana 8</button>
        <button onclick="verSemana(9)">Semana 9</button>
        <button onclick="mostrarLogin()">Iniciar Sesión</button>
    </div>
</nav>

<!-- 📦 CONTENIDO -->
<div id="contenido">
    <h1>Bienvenido al curso</h1>
    <p>Selecciona una semana o inicia sesión</p>
</div>

<!-- 🔐 LOGIN OCULTO -->
<div id="login" class="login-box" style="display:none;">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
</div>

<script src="script.js"></script>

</body>
</html>
