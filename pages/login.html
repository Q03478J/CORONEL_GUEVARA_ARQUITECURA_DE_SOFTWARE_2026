<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="supabase-url" content="https://kjspmefhcobwrtgtalsc.supabase.co">
    <meta name="supabase-key" content="sb_publishable_A_sZ2eTfnp2a5zlt6XIqkg_mRudHh7J">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iniciar Sesión - CORONEL_GUEVARA_2026">
    <title>Iniciar Sesión | CORONEL_GUEVARA_2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/chatbox.css">
</head>

<body style="background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary));">
    <div
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--spacing-lg);">
        <div class="card animate-fade-in-scale"
            style="max-width: 450px; width: 100%; border: none; box-shadow: var(--shadow-2xl);">
            <div style="text-align: center; margin-bottom: var(--spacing-2xl);">
                <img src="../assets/images/upla.png" alt="UPLA Logo" style="height: 80px; margin-bottom: var(--spacing-md);"
                    onerror="this.style.display='none'">
                <h1 class="logo" style="font-size: var(--font-size-3xl); margin-bottom: var(--spacing-xs);">
                    CORONEL<span class="logo-accent">_GUEVARA</span>
                </h1>
                <p style="color: var(--color-text-secondary);">Arquitectura de Software</p>
            </div>

            <div class="card-header" style="padding-bottom: var(--spacing-md);">
                <h2 class="card-title" style="text-align: center;">Iniciar Sesión</h2>
                <p class="card-description" style="text-align: center;">Ingresa tus credenciales para acceder</p>
            </div>

            <div class="card-body">
                <form id="loginForm">
                    <div id="errorMessage" class="alert alert-error"
                        style="display: none; margin-bottom: var(--spacing-md);"></div>

                    <div class="form-group">
                        <label class="form-label" for="email">Correo Electrónico</label>
                        <input type="email" id="email" class="form-input" required placeholder="estudiante@ejemplo.com"
                            autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Contraseña</label>
                        <input type="password" id="password" class="form-input" required placeholder="••••••••"
                            autocomplete="current-password">
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; justify-content: space-between;">
                        <label style="display: flex; align-items: center; gap: var(--spacing-xs); cursor: pointer;">
                            <input type="checkbox" id="remember">
                            <span style="font-size: var(--font-size-sm);">Recuérdame</span>
                        </label>
                        <a href="#" style="font-size: var(--font-size-sm); color: var(--color-primary);">¿Olvidaste tu
                            contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-lg);"
                        id="loginBtn">
                        <span id="loginText">Iniciar Sesión</span>
                        <div class="spinner spinner-sm" id="loginSpinner" style="display: none;"></div>
                    </button>
                </form>

                <div
                    style="text-align: center; margin-top: var(--spacing-xl); padding-top: var(--spacing-xl); border-top: 1px solid var(--color-border);">
                    <p style="font-size: var(--font-size-sm); color: var(--color-text-secondary);">
                        ¿No tienes cuenta? <a href="contact.html"
                            style="color: var(--color-primary); font-weight: var(--font-weight-semibold);">Contacta al
                            administrador</a>
                    </p>
                </div>

                <div style="text-align: center; margin-top: var(--spacing-md);">
                    <a href="../index.html" class="btn btn-ghost">
                        ← Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/chatbox.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Obtener tus credenciales exactas de los meta tags
            const supabaseUrl = document.querySelector('meta[name="supabase-url"]').content;
            const supabaseKey = document.querySelector('meta[name="supabase-key"]').content;

            // 2. Inicializar Supabase directamente
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            // 3. Darle vida al botón
            document.getElementById('loginForm').addEventListener('submit', async function (e) {
                e.preventDefault(); // Evita que la página se recargue

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const errorMessage = document.getElementById('errorMessage');
                const loginBtn = document.getElementById('loginBtn');
                const loginText = document.getElementById('loginText');
                const loginSpinner = document.getElementById('loginSpinner');

                if (!email || !password) return;

                // Mostrar el efecto de "cargando..."
                loginBtn.disabled = true;
                loginText.style.display = 'none';
                loginSpinner.style.display = 'inline-block';
                errorMessage.style.display = 'none';

                // 4. Intentar iniciar sesión en tu proyecto CORONEL_GUEVARA
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    // Si falla, mostramos el mensaje de error en pantalla
                    errorMessage.textContent = 'Credenciales inválidas. Verifica tu correo y contraseña.';
                    errorMessage.style.display = 'block';
                    
                    loginBtn.disabled = false;
                    loginText.style.display = 'inline';
                    loginSpinner.style.display = 'none';
                } else {
                    // ¡Éxito! Redirigimos a la portada o unidad
                    window.location.href = '../index.html'; 
                }
            });
        });
    </script>
